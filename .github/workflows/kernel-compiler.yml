name: Building New Kernel

on: [push]

env:
  GIT_SECRETB: ${{ secrets.GIT_SECRETB }}
  GIT_SECRET: ${{ secrets.GIT_SECRET }}
  BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
  GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
  ZIP_PASS: ${{ secrets.ZIP_PASS }}
  TZ: Asia/Jakarta

jobs:
  build-vayu-r-oss-g-d:

    runs-on: ubuntu-latest
    container:
      image: zycromerz/kerneldocker:v3

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: initialize
        run: |
          chmod +x misc/initialize.sh
          bash misc/initialize.sh


      - name: Compile Kernel
        run: |
          chmod +x maing.sh
          bash maing.sh 'vayu-r-oss-g-d'

  build-vayu-r-oss-h-c:

    runs-on: ubuntu-latest
    container:
      image: zycromerz/kerneldocker:v3

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: initialize
        run: |
          chmod +x misc/initialize.sh
          bash misc/initialize.sh


      - name: Compile Kernel
        run: |
          chmod +x maing.sh
          bash maing.sh 'vayu-r-oss-h-c'

  build-vayu-r-oss-h-d:

    runs-on: ubuntu-latest
    container:
      image: zycromerz/kerneldocker:v3

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: initialize
        run: |
          chmod +x misc/initialize.sh
          bash misc/initialize.sh


      - name: Compile Kernel
        run: |
          chmod +x maing.sh
          bash maing.sh 'vayu-r-oss-h-d'

